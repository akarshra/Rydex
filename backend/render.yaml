services:
  - type: web
    name: rydex-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://[POSTGRESQL_HOST]:5432/[POSTGRESQL_DB]
      - key: DATABASE_USERNAME
        value: [POSTGRESQL_USER]
      - key: DATABASE_PASSWORD
        value: [POSTGRESQL_PASSWORD]
      - key: JWT_SECRET
        value: [JWT_SECRET]
      - key: NEXT_PUBLIC_BACKEND_URL
        value: [RENDER_EXTERNAL_URL]
      - key: NEXT_PUBLIC_APP_URL
        value: [FRONTEND_URL]
      - key: MONGODB_URL
        value: [MONGODB_URL]
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: rydex-postgres
    databaseName: rydex
    user: rydex_user
    plan: starter

  - name: rydex-redis
    redisVersion: 7
    plan: starter

  - name: rydex-mongo
    mongoDBVersion: 6
    plan: starter