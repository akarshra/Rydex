server:
  port: 8080

spring:
  application:
    name: rydex-backend
  graphql:
    graphiql:
      enabled: true
    path: /graphql
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rydex}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    issuer: rydex
    expiration-minutes: 1440
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
  supabase:
    url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:kyc-documents}
