server:
  port: ${PORT:8080}

spring:
  application:
    name: rydex-backend

  graphql:
    graphiql:
      enabled: true
    path: /graphql

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: rydex
    expiration-minutes: 1440

  stripe:
    secret-key: ${STRIPE_SECRET_KEY}

  supabase:
    url: ${SUPABASE_URL}
    service-key: ${SUPABASE_SERVICE_KEY}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET}