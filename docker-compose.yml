version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rydex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

    backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rydex
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      MONGODB_URL: mongodb://mongo:27017/rydex
    depends_on:
      - postgres
      - redis
      - mongo

  frontend:
    build:
      context: ./rydex
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      MONGODB_URL: mongodb://mongo:27017/rydex
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5001
    depends_on:
      - backend
      - socketserver
      - mongo

  socketserver:
    build:
      context: ./socketServer
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      MONGODB_URL: mongodb://mongo:27017/rydex
      REDIS_URL: redis://redis:6379
      NEXT_BASE_URL: http://localhost:3000
    depends_on:
      - redis
      - mongo

volumes:
  postgres-data:
  redis-data:
  mongo-data:
